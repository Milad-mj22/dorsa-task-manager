{% load static %}
{% load widget_tweaks %}

<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
<link rel="stylesheet" href="{% static 'css/all.min.css' %}">
<link rel="stylesheet" href="{% static 'css/base.css' %}">
<link rel="stylesheet" href="{% static 'css/fonts.css' %}">

<style>
  :root {
    --primary: #4f46e5;
    --primary-soft: rgba(79, 70, 229, 0.08);
    --accent: #f97316;
    --danger: #ef4444;
    --radius-xl: 22px;
    --radius-lg: 18px;
    --radius-md: 12px;
    --shadow-soft: 0 20px 50px rgba(15, 23, 42, 0.16);
  }

  body {
    background:
      radial-gradient(circle at top right, #e5edff, #f3f4f6 40%, #eef2ff 100%);
    margin: 0;
    font-family: 'Vazir', sans-serif;
  }

  .ticket-page {
    max-width: 960px;
    margin: 32px auto 48px;
    padding: 0 16px;
    direction: rtl;
    text-align: right;
  }

  .ticket-card {
    backdrop-filter: blur(18px);
    background: rgba(255, 255, 255, 0.9);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(148, 163, 184, 0.35);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    overflow: hidden;
  }

  .ticket-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 26px 70px rgba(15, 23, 42, 0.22);
    border-color: rgba(79, 70, 229, 0.5);
  }

  .ticket-header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    padding: 18px 22px 6px;
    flex-wrap: wrap;
  }

  .ticket-header-main {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .icon-circle {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    padding: 10px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    box-shadow: 0 12px 30px rgba(79, 70, 229, 0.6);
  }

  .ticket-title-text {
    font-weight: 800;
    color: #111827;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }

  .ticket-subtitle-text {
    font-size: 0.85rem;
    color: #6b7280;
  }

  .ticket-meta-pill {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    background: var(--primary-soft);
    color: #4338ca;
    border: 1px solid rgba(129, 140, 248, 0.7);
    white-space: nowrap;
  }

  .ticket-body {
    padding: 10px 22px 22px;
  }

  .btn-submit {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    border: none;
    color: white;
    padding: 0.6rem 1.8rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    box-shadow: 0 14px 34px rgba(79, 70, 229, 0.5);
    transition: transform 0.15s ease, filter 0.15s ease;
  }

  .btn-submit:hover {
    filter: brightness(1.04);
    transform: translateY(-1px);
  }

  .btn-submit i {
    font-size: 0.95rem;
  }

  /* Media Queries for Mobile */
  @media (max-width: 768px) {
    .ticket-page {
      margin-top: 20px;
    }

    .ticket-card {
      padding-inline: 4px;
    }

    .ticket-header-bar {
      padding-inline: 18px;
    }

    .ticket-body {
      padding-inline: 18px;
    }

    .ticket-footer-row {
      flex-direction: column-reverse;
      align-items: flex-start;
    }

    .ticket-title-text {
      font-size: 1rem;
    }

    .ticket-subtitle-text {
      font-size: 0.8rem;
    }

    .ticket-meta-pill {
      font-size: 0.7rem;
      padding: 3px 8px;
    }

    .ticket-body {
      padding: 10px;
    }

    .btn-submit {
      font-size: 0.85rem;
      padding: 0.5rem 1.5rem;
    }
  }

  @media (max-width: 576px) {
    .ticket-title-text {
      font-size: 1.5rem;
    }

    .ticket-subtitle-text {
      font-size: 1.5rem;
    }

    .ticket-card {
      padding-inline: 8px;
    }

    .ticket-body {
      padding-inline: 12px;
    }

    .ticket-footer-row {
      flex-direction: column;
      align-items: flex-start;
    }

    .btn-submit {
      font-size: 0.85rem;
      padding: 0.4rem 1.3rem;
    }
  }
</style>

<div class="ticket-page">
  <div class="ticket-card">
    <div class="ticket-header-bar">
      <div class="ticket-header-main">
        <div class="ticket-title-text">
          <span class="icon-circle">
            <i class="fas fa-check-circle"></i>
          </span>
          <span>تیکت شما با موفقیت ارسال شد</span>
        </div>
        <div class="ticket-subtitle-text">
          تیکت شماره <strong>{{ ticket.id }}</strong> با موفقیت ارسال شد. در اسرع وقت با شما تماس خواهیم گرفت.
        </div>
      </div>

      <div class="ticket-meta-pill">
        ⏱ زمان تقریبی پاسخ: حداکثر ۲۴ ساعت کاری
      </div>
    </div>

    <div class="ticket-body">
      <div class="alert alert-success" role="alert">
        تیکت شما با شماره <strong>{{ ticket.id }}</strong> در سیستم ثبت شد. لطفاً منتظر پاسخ از تیم پشتیبانی باشید.
      </div>

      <!-- <div class="d-flex justify-content-center mt-4">
        <a href="/" class="btn btn-primary btn-lg px-5 py-3" style="font-size: 1.2rem; border-radius: 30px; text-transform: uppercase; font-weight: 600;">
          بازگشت به صفحه اصلی
        </a>
      </div> -->
    </div>
  </div>
</div>
