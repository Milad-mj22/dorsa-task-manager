{% extends "users/base.html" %}
{% block content %}

<style>
  .password-page {
    max-width: 450px;
    margin: 0 auto;
    padding: 40px 10px;
    text-align: center; /* full center */
    direction: rtl;
  }

  .password-card {
    border-radius: 24px;
    box-shadow: 0 18px 45px rgba(148, 120, 52, 0.16);
    border: 1px solid rgba(212, 178, 88, 0.45);
    padding: 25px;
  }

  .password-title {
    font-weight: 800;
    font-size: 21px;
  }

  .password-subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 10px;
  }

  label { 
    font-size: 13px;
    font-weight: 600;
    text-align: center; /* label center */
    width: 100%;
  }

  input {
    text-align: center;
  }

  .alert {
    text-align: center;
  }

  .btn-gold {
    background: linear-gradient(135deg, #F4B41A, #D97706);
    border: none;
    color: #111827;
    font-weight: 600;
  }

  .btn-gold:hover {
    filter: brightness(0.95);
  }
</style>


<div class="password-page">
  <div class="password-card">

    <h3 class="password-title mb-2">🔐 تغییر رمز عبور</h3>
    <div class="password-subtitle">لطفاً یک رمز عبور جدید و قوی انتخاب کنید</div>

    {% if form.non_field_errors %}
      <div class="alert alert-danger mt-2">
        {% for error in form.non_field_errors %}
          <div><b>{{ error }}</b></div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <label for="id_old_password">رمز عبور فعلی</label>
      <input type="password" name="old_password" id="id_old_password"
             autocomplete="current-password" class="form-control mb-3"
             placeholder="رمز قبلی را وارد کنید" required>

      <label for="id_new_password1">رمز عبور جدید</label>
      <input type="password" name="new_password1" id="id_new_password1"
             autocomplete="new-password" class="form-control mb-3"
             placeholder="رمز جدید را وارد کنید" required>

      <label for="id_new_password2">تکرار رمز جدید</label>
      <input type="password" name="new_password2" id="id_new_password2"
             autocomplete="new-password" class="form-control mb-4"
             placeholder="تکرار رمز جدید" required>

      <button type="submit" class="btn btn-gold w-100 py-2" style="border-radius:999px;">
        ذخیره رمز جدید
      </button>

    </form>
  </div>
</div>

{% endblock content %}
