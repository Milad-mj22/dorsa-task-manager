<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>صفحه پیدا نشد</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <style>
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(99,102,241,.22), transparent 55%),
        radial-gradient(900px 500px at 90% 0%, rgba(34,197,94,.18), transparent 55%),
        linear-gradient(180deg,#f8fafc,#eef2ff);
      font-family: Vazirmatn, Tahoma, sans-serif;
    }

    .error-card{
      background:#fff;
      border-radius:26px;
      box-shadow:0 30px 70px rgba(2,6,23,.18);
      padding:48px 40px;
      max-width:520px;
      width:100%;
      text-align:center;
    }

    .error-icon{
      width:90px;
      height:90px;
      border-radius:26px;
      margin:0 auto 20px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(99,102,241,.12);
      border:1px solid rgba(99,102,241,.3);
      color:#4f46e5;
      font-size:42px;
    }

    .error-code{
      font-size:3.2rem;
      font-weight:900;
      color:#4f46e5;
      margin-bottom:8px;
    }

    .error-title{
      font-size:1.35rem;
      font-weight:800;
      margin-bottom:12px;
      color:#0f172a;
    }

    .error-desc{
      font-size:.95rem;
      color:#64748b;
      line-height:1.9;
      margin-bottom:28px;
    }

    .btn-home{
      border-radius:16px;
      padding:10px 26px;
      font-weight:800;
      box-shadow:0 12px 30px rgba(79,70,229,.35);
    }

    .btn-report{
      border-radius:16px;
      padding:10px 22px;
      font-weight:800;
    }
  </style>
</head>

<body>

<div class="error-card">
  <div class="error-icon">
    <i class="fa-solid fa-link-slash"></i>
  </div>

  <div class="error-code">404</div>
  <div class="error-title">لینک پیدا نشد</div>

  <div class="error-desc">
    صفحه‌ای که به دنبال آن هستید وجود ندارد یا لینک آن اشتباه است.  
    در صورت تمایل می‌توانید این لینک خراب را برای پشتیبانی گزارش کنید.
  </div>

  <div class="d-flex justify-content-center gap-3 flex-wrap">
    <a href="/" class="btn btn-primary btn-home">
      <i class="fa-solid fa-house ms-1"></i>
      صفحه اصلی
    </a>

    <button onclick="history.back()" class="btn btn-outline-secondary">
      <i class="fa-solid fa-arrow-right ms-1"></i>
      بازگشت
    </button>

    <button id="reportBtn" class="btn btn-outline-danger btn-report">
      <i class="fa-solid fa-flag ms-1"></i>
      گزارش لینک خراب
    </button>
  </div>
</div>

<script>
(function () {
  const btn = document.getElementById("reportBtn");
  if (!btn) return;

  btn.addEventListener("click", function () {
    btn.disabled = true;
    btn.innerHTML = "در حال ارسال...";

    const data = new FormData();
    data.append("path", window.location.pathname);
    data.append("user_agent", navigator.userAgent);
    data.append("timestamp", new Date().toISOString());
    data.append("error_type", "404");

    fetch("/report-server-error/", {
      method: "POST",
      body: data,
      headers: { "X-Requested-With": "XMLHttpRequest" }
    })
    .then(res => res.json())
    .then(res => {
      if (res.ok) {
        btn.classList.remove("btn-outline-danger");
        btn.classList.add("btn-outline-success");
        btn.innerHTML = "گزارش ارسال شد ✓";
      } else {
        btn.innerHTML = "خطا در ارسال";
        btn.disabled = false;
      }
    })
    .catch(() => {
      btn.innerHTML = "خطا در ارتباط";
      btn.disabled = false;
    });
  });
})();
</script>

</body>
</html>
