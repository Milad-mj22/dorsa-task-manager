{% extends "users/base.html" %}
{% block title %}Delete Story{% endblock %}
{% block content %}
  <div class="card">
    <h2>Are you sure you want to delete this story?</h2>
    <p><strong>{{ story.title }}</strong></p>
    <form method="post">
      {% csrf_token %}
      <button type="submit">Yes, Delete</button>
    </form>
    <a class="back-link" href="{% url 'story_list' %}">Cancel</a>
  </div>
{% endblock %}
