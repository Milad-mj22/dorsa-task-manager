{% extends "users/base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<style>
    body, html {
        direction: rtl;
        text-align: right;
    }

    .form-card {
        max-width: 550px;
        margin: 40px auto;
        background: #ffffff;
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 7px 20px rgba(0, 0, 0, 0.08);
    }

    .form-card h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.6rem;
    }

    .form-card form p {
        margin-bottom: 15px;
    }

    .form-card label {
        font-weight: bold;
        margin-bottom: 5px;
        display: inline-block;
    }

    .form-card input,
    .form-card select,
    .form-card textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #f9fafb;
        transition: 0.2s;
    }

    .form-card input:focus,
    .form-card select:focus,
    .form-card textarea:focus {
        border-color: #2563eb;
        background: #ffffff;
        outline: none;
        box-shadow: 0 0 4px rgba(37, 99, 235, 0.3);
    }

    .submit-btn {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background: #2563eb;
        color: white;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .submit-btn:hover {
        background: #1d4ed8;
    }

    .back-link {
        display: block;
        margin-top: 15px;
        text-align: center;
        color: #374151;
        text-decoration: none;
        font-weight: 500;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="form-card">

    <h2>{{ title }}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="submit-btn">{{ title }}</button>
    </form>

    <a class="back-link" href="{% url 'story_list' %}">← بازگشت به لیست استوری‌ها</a>

</div>

{% endblock %}
