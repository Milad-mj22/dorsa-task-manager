{% extends "users/base.html" %}
{% block content %}
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نمای کلی تیم و کاربران</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ===== Base ===== */
    .overview-page {
      min-height: calc(100vh - 80px);
      padding: 28px 24px 40px;
      font-family: 'Inter', "Vazirmatn", sans-serif;
      direction: rtl;
      color: #1a1a2e;
      background: #f4f5f7;
    }

    /* ===== Page Header ===== */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-header h1 .badge-count {
      font-size: 14px;
      background: #e8ecf1;
      color: #4a4a6a;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-modern {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', "Vazirmatn", sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
    }

    .btn-modern:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }

    .btn-primary-modern {
      background: linear-gradient(135deg, #5850ec, #7c3aed);
      color: #fff;
      box-shadow: 0 4px 20px rgba(88, 80, 236, 0.3);
    }

    .btn-primary-modern:hover {
      box-shadow: 0 8px 35px rgba(88, 80, 236, 0.4);
      color: #fff;
    }

    .btn-outline-modern {
      background: #fff;
      color: #4a4a6a;
      border: 1px solid #e0e4ea;
    }

    .btn-outline-modern:hover {
      background: #f8f9fa;
      border-color: #c8cdd6;
      color: #1a1a2e;
    }

    .btn-outline-modern .icon {
      font-size: 18px;
      line-height: 1;
    }

    /* ===== Stats Summary ===== */
    .stats-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #e0e4ea;
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }

    .stat-card .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      display: block;
    }

    .stat-card .stat-label {
      font-size: 13px;
      color: #6b7a8f;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-card .stat-icon {
      font-size: 20px;
    }

    .stat-card.primary .stat-number { color: #5850ec; }
    .stat-card.success .stat-number { color: #22c55e; }
    .stat-card.warning .stat-number { color: #f59e0b; }
    .stat-card.danger .stat-number { color: #ef4444; }

    /* ===== Team Cards ===== */
    .team-card {
      background: #ffffff;
      border: 1px solid #e0e4ea;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.3s ease;
    }

    .team-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .team-card .team-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f2f5;
      flex-wrap: wrap;
      gap: 12px;
    }

    .team-card .team-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team-card .team-header .team-total {
      font-size: 14px;
      color: #6b7a8f;
      background: #f0f2f5;
      padding: 4px 16px;
      border-radius: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .team-card .team-header .team-total i {
      font-size: 14px;
    }

    .team-card .team-content {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .team-card .chart-container {
      background: #fafbfc;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #e8ecf1;
      position: relative;
    }

    .team-card .chart-container h3 {
      font-size: 14px;
      font-weight: 600;
      color: #4a4a6a;
      margin-bottom: 12px;
      text-align: center;
    }

    .team-card .chart-container canvas {
      max-height: 220px;
      max-width: 100%;
    }

    /* ===== User List ===== */
    .user-list {
      background: #fafbfc;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #e8ecf1;
    }

    .user-list h3 {
      font-size: 14px;
      font-weight: 600;
      color: #4a4a6a;
      margin-bottom: 12px;
      text-align: center;
    }

    .user-list .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #e8ecf1;
      transition: background 0.2s ease;
      border-radius: 8px;
    }

    .user-list .user-item:last-child {
      border-bottom: none;
    }

    .user-list .user-item:hover {
      background: #f0f2f5;
    }

    .user-list .user-item .user-name {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-list .user-item .user-name .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5850ec, #7c3aed);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-list .user-item .user-time {
      font-size: 13px;
      font-weight: 600;
      color: #4a4a6a;
    }

    .user-list .user-item .user-time .bar {
      display: inline-block;
      height: 6px;
      border-radius: 4px;
      background: linear-gradient(90deg, #5850ec, #7c3aed);
      margin-left: 8px;
      transition: width 0.6s ease;
    }

    /* ===== Responsive ===== */
    @media (max-width: 992px) {
      .team-card .team-content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .overview-page {
        padding: 16px 12px 32px;
      }

      .page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .page-header h1 {
        font-size: 22px;
      }

      .header-actions {
        width: 100%;
      }

      .header-actions .btn-modern {
        flex: 1;
        justify-content: center;
      }

      .stats-summary {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .stat-card {
        padding: 14px 16px;
      }

      .stat-card .stat-number {
        font-size: 22px;
      }

      .team-card {
        padding: 16px;
      }

      .team-card .team-header {
        flex-direction: column;
        align-items: stretch;
      }

      .team-card .chart-container {
        padding: 12px;
      }

      .team-card .chart-container canvas {
        max-height: 180px;
      }

      .user-list {
        padding: 12px;
      }
    }

    @media (max-width: 480px) {
      .stats-summary {
        grid-template-columns: 1fr;
      }

      .team-card .chart-container canvas {
        max-height: 150px;
      }
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f0f2f5;
    }

    ::-webkit-scrollbar-thumb {
      background: #d0d5dd;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #b0b8c4;
    }

    /* ===== Animation ===== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .team-card {
      animation: fadeInUp 0.5s ease forwards;
    }

    .team-card:nth-child(2) { animation-delay: 0.1s; }
    .team-card:nth-child(3) { animation-delay: 0.2s; }
    .team-card:nth-child(4) { animation-delay: 0.3s; }
    .team-card:nth-child(5) { animation-delay: 0.4s; }
  </style>
</head>

<div class="overview-page">

  <!-- ===== Header ===== -->
  <div class="page-header">
    <h1>
      🏢 نمای کلی تیم و کاربران
      <span class="badge-count" id="teamCount">۰ تیم</span>
    </h1>
    <div class="header-actions">
      <button class="btn-modern btn-primary-modern" onclick="location.reload()">
        <span class="icon">🔄</span>
        بروزرسانی
      </button>
      <button class="btn-modern btn-outline-modern" onclick="window.print()">
        <span class="icon">🖨️</span>
        چاپ
      </button>
    </div>
  </div>

  <!-- ===== Stats Summary ===== -->
  <div class="stats-summary" id="statsSummary">
    <div class="stat-card primary">
      <span class="stat-number" id="totalTeams">۰</span>
      <span class="stat-label"><span class="stat-icon">👥</span> تیم‌ها</span>
    </div>
    <div class="stat-card success">
      <span class="stat-number" id="totalUsers">۰</span>
      <span class="stat-label"><span class="stat-icon">👤</span> کاربران</span>
    </div>
    <div class="stat-card warning">
      <span class="stat-number" id="totalHours">۰</span>
      <span class="stat-label"><span class="stat-icon">⏱️</span> ساعت کل</span>
    </div>
    <div class="stat-card danger">
      <span class="stat-number" id="avgHours">۰</span>
      <span class="stat-label"><span class="stat-icon">📊</span> میانگین هر کاربر</span>
    </div>
  </div>

  <!-- ===== Team Cards ===== -->
  <div id="overview-container"></div>

</div>

<script>
  const data = JSON.parse(`{{ overview_json|escapejs }}`);
  const container = document.getElementById('overview-container');

  // ===== Update Stats =====
  let totalTeams = 0;
  let totalUsers = 0;
  let totalHours = 0;

  Object.keys(data).forEach(teamName => {
    const teamData = data[teamName];
    totalTeams++;
    totalUsers += teamData.users.length;
    totalHours += teamData.total;
  });

  document.getElementById('totalTeams').textContent = totalTeams;
  document.getElementById('totalUsers').textContent = totalUsers;
  document.getElementById('totalHours').textContent = totalHours.toFixed(1);
  document.getElementById('avgHours').textContent = totalUsers > 0 ? (totalHours / totalUsers).toFixed(1) : '۰';
  document.getElementById('teamCount').textContent = `${totalTeams} تیم`;

  // ===== Color Palettes =====
  const colors = [
    { bg: 'rgba(56, 189, 248, 0.7)', border: '#38bdf8' },
    { bg: 'rgba(52, 211, 153, 0.7)', border: '#34d399' },
    { bg: 'rgba(251, 191, 36, 0.7)', border: '#fbbf24' },
    { bg: 'rgba(248, 113, 113, 0.7)', border: '#f87171' },
    { bg: 'rgba(167, 139, 250, 0.7)', border: '#a78bfa' },
    { bg: 'rgba(251, 146, 60, 0.7)', border: '#fb923c' },
    { bg: 'rgba(236, 72, 153, 0.7)', border: '#ec4899' },
    { bg: 'rgba(52, 211, 153, 0.7)', border: '#34d399' },
  ];

  const userColors = [
    'rgba(56, 189, 248, 0.8)',
    'rgba(52, 211, 153, 0.8)',
    'rgba(251, 191, 36, 0.8)',
    'rgba(248, 113, 113, 0.8)',
    'rgba(167, 139, 250, 0.8)',
    'rgba(251, 146, 60, 0.8)',
    'rgba(236, 72, 153, 0.8)',
  ];

  // ===== Generate Team Cards =====
  Object.keys(data).forEach((teamName, i) => {
    const teamData = data[teamName];
    const userNames = teamData.users.map(u => u.name);
    const userTimes = teamData.users.map(u => u.time);
    const colorIndex = i % colors.length;

    // Sort users by time (descending)
    const sortedUsers = [...teamData.users].sort((a, b) => b.time - a.time);
    const maxTime = Math.max(...userTimes, 0.1);

    const card = document.createElement('div');
    card.className = 'team-card';

    card.innerHTML = `
      <div class="team-header">
        <h2>
          <span style="font-size:24px;">👥</span>
          ${teamName}
        </h2>
        <span class="team-total">
          ⏱ ${teamData.total.toFixed(1)} ساعت
        </span>
      </div>
      <div class="team-content">
        <div class="chart-container">
          <h3>📊 زمان صرف‌شده به تفکیک کاربر</h3>
          <canvas id="chart_${i}"></canvas>
        </div>
        <div class="user-list">
          <h3>👤 لیست کاربران</h3>
          ${sortedUsers.map((user, idx) => {
            const percentage = maxTime > 0 ? (user.time / maxTime * 100) : 0;
            return `
              <div class="user-item">
                <span class="user-name">
                  <span class="avatar">${user.name.charAt(0).toUpperCase()}</span>
                  ${user.name}
                </span>
                <span class="user-time">
                  <span class="bar" style="width:${percentage}%;"></span>
                  ${user.time.toFixed(1)}h
                </span>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
    container.appendChild(card);

    // ===== Chart =====
    const ctx = document.getElementById(`chart_${i}`).getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: userNames,
        datasets: [{
          label: 'ساعت صرف‌شده',
          data: userTimes,
          backgroundColor: userNames.map((_, idx) => userColors[idx % userColors.length]),
          borderColor: userNames.map((_, idx) => userColors[idx % userColors.length].replace('0.8', '1')),
          borderWidth: 2,
          borderRadius: 6,
        }]
      },
      options: {
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(0,0,0,0.04)' },
            ticks: { 
              font: { size: 10 },
              callback: function(value) { return value + 'h'; }
            }
          },
          x: {
            grid: { display: false },
            ticks: { font: { size: 10 } }
          }
        },
        responsive: true,
        maintainAspectRatio: true,
        animation: {
          duration: 800,
          easing: 'easeInOutQuart'
        }
      }
    });
  });
</script>

{% endblock %}
