{% extends "users/base.html" %}
{% load static %}
{% block content %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انتخاب اسپرینت</title>

    <style>


        .container {
            background: #fff;
            width: 500px;
            padding: 30px 40px;
            border-radius: 14px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            color: #222;
        }

        label {
            font-size: 15px;
            font-weight: 500;
        }

        select {
            width: 100%;
            margin-top: 10px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1.5px solid #d0d0d0;
            font-size: 15px;
            background: #fff;
            transition: 0.2s;
        }

        select:hover {
            border-color: #9b9b9b;
        }

        select:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 4px rgba(74,108,247,0.12);
            outline: none;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: #4a6cf7;
            border: none;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #3b57d6;
        }

        .hint {
            margin-top: 18px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

    </style>
</head>
<body>
    
    <div class="container">

        <h2>انتخاب اسپرینت</h2>

        <form method="get" action="{% url 'assign_stories_to_project' %}">
            <label for="sprint">اسپرینت مورد نظر را انتخاب کنید:</label>

            <select name="sprint_id" id="sprint" onchange="this.form.submit();">
                <option value="">-- انتخاب اسپرینت --</option>
                {% for sprint in sprints %}
                    <option value="{{ sprint.id }}">{{ sprint.name }}</option>
                {% endfor %}
            </select>

            <div class="hint">با انتخاب اسپرینت، لیست استوری‌ها نمایش داده می‌شود.</div>
        </form>

    </div>

</body>
{% endblock %}
