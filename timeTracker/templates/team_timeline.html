{% extends "users/base.html" %}
{% block content %}
<head>
  <meta charset="UTF-8">
  <title>Team Timeline</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="container mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold mb-6">📈 Team Activity Over Time</h1>

    <div class="bg-white p-6 rounded-xl shadow-md">
      <canvas id="timelineChart" height="100"></canvas>
    </div>
  </div>

  <script>
    const data = JSON.parse(`{{ chart_json|escapejs }}`);

    new Chart(document.getElementById("timelineChart"), {
      type: "line",
      data: data,
      options: {
        responsive: true,
        plugins: {
          title: {
            display: true,
            text: "Team Time Spent Per Day"
          },
          tooltip: {
            mode: 'index',
            intersect: false
          },
          legend: {
            position: 'bottom'
          }
        },
        interaction: {
          mode: 'nearest',
          axis: 'x',
          intersect: false
        },
        scales: {
          y: {
            title: {
              display: true,
              text: 'Hours'
            },
            beginAtZero: true
          },
          x: {
            title: {
              display: true,
              text: 'Date'
            }
          }
        }
      }
    });
  </script>
</body>
  {% endblock %}
