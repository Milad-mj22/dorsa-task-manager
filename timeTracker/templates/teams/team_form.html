{% extends "users/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}

<style>

.form-page {
    min-height: calc(100vh - 80px);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Vazirmatn","IRANSans",sans-serif;
    direction: rtl;
    text-align: right;
    padding: 2rem;
}

  .card {
    width: 50%;
    background: rgba(15, 23, 42, 0.92);
    border-radius: 1.5rem;
    padding: 1.75rem 2rem;
    box-shadow:
      0 20px 45px rgba(15, 23, 42, 0.65),
      0 0 0 1px rgba(148, 163, 184, 0.18);
    color: #e5e7eb;
    backdrop-filter: blur(24px);
  }


/* ----- Title ----- */
.card h2 {
    text-align: center;
    margin-bottom: 1.4rem;
    font-weight: 600;
    font-size: 1.35rem;
    color:#fff;
}

/* ----- Scrollable Zone ----- */
.form-scroll-area {
    max-height: 450px;
    overflow-y: auto;
    padding-right: 5px;
    scrollbar-width: thin;
    scrollbar-color: #4c6ef5 rgba(255,255,255,0.1);
}

.form-scroll-area::-webkit-scrollbar { width: 6px; }
.form-scroll-area::-webkit-scrollbar-thumb {
    background:#6366f1;
    border-radius: 10px;
}
.form-scroll-area::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.08);
}

/* ----- Form Style ----- */
form {
    display:flex;
    flex-direction:column;
    gap:1rem;
}

form p { margin:0; }

form label {
    font-size:0.88rem;
    color:#d1d5db;
    display:block;
    margin-bottom:0.25rem;
}

form input,
form select,
form textarea {
    width:100%;
    padding:0.75rem 0.9rem;
    border-radius:0.7rem;
    border:1px solid rgba(255,255,255,0.28);
    background:rgba(15,23,42,0.78);
    color:#fff;
    font-size:0.9rem;
    text-align:right;
}

form input:focus,
form select:focus,
form textarea:focus {
    border-color:#818cf8;
    box-shadow:0 0 8px rgba(129,140,248,0.7);
    background:rgba(15,23,42,0.92);
}

/* ----- Submit Button ----- */
.btn-primary {
    margin-top:.5rem;
    padding:0.65rem 1.4rem;
    border-radius:999px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:#fff;
    font-weight:600;
    font-size:0.9rem;
    border:none;
    cursor:pointer;
    box-shadow:0 12px 26px rgba(79,70,229,0.45);
    align-self:flex-start;
    transition:.15s ease;
}

.btn-primary:hover {
    transform:translateY(-2px);
    filter:brightness(1.06);
}

/* ----- Back Link ----- */
.back-link {
    display:inline-block;
    margin-top:1.1rem;
    color:#94a3b8;
    text-decoration:none;
    font-size:0.9rem;
}

.back-link:hover { color:#fff; }

</style>


<div class="form-page">
  <div class="card">

    <h2>{{ title }}</h2>

    <div class="form-scroll-area">
      <form method="post" class="modern-form">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-primary">ثبت</button>
      </form>
    </div>

    <a href="{% url 'team_list' %}" class="back-link">بازگشت به لیست تیم‌ها</a>

  </div>
</div>

{% endblock %}
