{% extends "users/base.html" %}
{% load static %}
{% block content %}
<head>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
  <div class="container mx-auto px-6 py-10">

    
    <h1 class="text-3xl font-bold mb-6">🧠 Time Tracking Dashboard</h1>

    <!-- Sprint selector -->
    <form method="get" class="mb-6">
      <label class="block text-sm font-semibold mb-1">Select Sprint:</label>
      <select name="sprint" class="p-2 border rounded w-60" onchange="this.form.submit()">
        {% for sprint in sprints %}
          <option value="{{ sprint.id }}" {% if sprint.id == selected_sprint.id %}selected{% endif %}>
            {{ sprint.name }}
          </option>
        {% endfor %}
      </select>
    </form>


<div class="bg-white p-6 rounded-2xl shadow-md mb-10">
  <h2 class="text-2xl font-semibold text-teal-600 mb-4">🏢 Total Time Spent Per Team</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <canvas id="team_bar_chart"></canvas>
    </div>
    <div>
      <canvas id="team_pie_chart"></canvas>
    </div>
  </div>
</div>

    <div id="dashboard-charts" class="space-y-10"></div>

    <!-- Chart rendering logic -->
    <script>
      const stackedData = JSON.parse('{{ stacked_data_json|escapejs }}');
      const goalData = JSON.parse('{{ goal_data_json|escapejs }}');

      const container = document.getElementById("dashboard-charts");

      Object.keys(stackedData).forEach((team, idx) => {
        const taskNames = Object.keys(stackedData[team]);
        const users = [...new Set(taskNames.flatMap(t => Object.keys(stackedData[team][t])))];

        // Build card
        const card = document.createElement("div");
        card.className = "bg-white p-6 rounded-xl shadow-md";

        card.innerHTML = `
          <h2 class="text-2xl font-bold text-indigo-600 mb-4">${team}</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <h3 class="text-lg font-semibold mb-2">⏱ Time by Users</h3>
              <canvas id="stacked_${idx}"></canvas>
            </div>
            <div>
              <h3 class="text-lg font-semibold mb-2">🎯 Goal vs Actual</h3>
              <canvas id="goal_${idx}"></canvas>
            </div>
          </div>
        `;
        container.appendChild(card);

        // Stacked Chart
        new Chart(document.getElementById(`stacked_${idx}`), {
          type: 'bar',
          data: {
            labels: taskNames,
            datasets: users.map(user => ({
              label: user,
              data: taskNames.map(task => stackedData[team][task][user] || 0),
              stack: 'users',
              backgroundColor: `hsl(${Math.random() * 360}, 70%, 70%)`
            }))
          },
          options: {
            plugins: { legend: { position: 'bottom' }},
            responsive: true,
            scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
          }
        });

        // Goal vs Actual
        const goals = taskNames.map(t => goalData[team]?.[t] || 0);
        const actuals = taskNames.map(t =>
          Object.values(stackedData[team][t]).reduce((a, b) => a + b, 0)
        );

        new Chart(document.getElementById(`goal_${idx}`), {
          type: 'bar',
          data: {
            labels: taskNames,
            datasets: [
              { label: 'Goal', data: goals, backgroundColor: 'rgba(59,130,246,0.5)' },
              { label: 'Actual', data: actuals, backgroundColor: 'rgba(239,68,68,0.6)' }
            ]
          },
          options: {
            plugins: { legend: { position: 'bottom' }},
            responsive: true,
            scales: { y: { beginAtZero: true } }
          }
        });
      });
    </script>
  </div>



<script>
  const teamChartData = JSON.parse('{{ team_hours_chart|escapejs }}');

  // Bar chart
  new Chart(document.getElementById('team_bar_chart'), {
    type: 'bar',
    data: {
      labels: teamChartData.labels,
      datasets: [{
        label: 'Total Hours',
        data: teamChartData.values,
        backgroundColor: 'rgba(56, 189, 248, 0.7)', // cyan
      }]
    },
    options: {
      plugins: {
        title: { display: true, text: 'Bar Chart – Hours per Team' },
        legend: { display: false }
      },
      responsive: true,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });

  // Pie chart
  new Chart(document.getElementById('team_pie_chart'), {
    type: 'pie',
    data: {
      labels: teamChartData.labels,
      datasets: [{
        label: 'Total Hours',
        data: teamChartData.values,
        backgroundColor: teamChartData.labels.map((_, i) =>
          `hsl(${i * 60}, 70%, 70%)`
        )
      }]
    },
    options: {
      plugins: {
        title: { display: true, text: 'Pie Chart – % Time by Team' },
        legend: { position: 'bottom' }
      },
      responsive: true
    }
  });
</script>

</body>
{% endblock %}
